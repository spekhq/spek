name: Publish IntelliJ Plugin

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v6
        with:
          node-version-file: '.nvmrc'

      - run: npm ci

      - name: Build core
        run: npm run build -w @spekjs/core

      - name: Build IntelliJ webview
        run: npm run build:intellij

      - uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v6

      - name: Verify version consistency
        if: startsWith(github.ref, 'refs/tags/v')
        working-directory: packages/intellij
        run: |
          TAG_VERSION="${GITHUB_REF#refs/tags/v}"
          PLUGIN_VERSION=$(grep '^pluginVersion' gradle.properties | cut -d'=' -f2 | tr -d ' \r')
          if [ "$TAG_VERSION" != "$PLUGIN_VERSION" ]; then
            echo "::error::Version mismatch: tag v${TAG_VERSION} but gradle.properties is ${PLUGIN_VERSION}"
            exit 1
          fi
          echo "Version matched: ${PLUGIN_VERSION}"

      - name: Publish to JetBrains Marketplace
        working-directory: packages/intellij
        run: ./gradlew publishPlugin
        env:
          PUBLISH_TOKEN: ${{ secrets.JETBRAINS_MARKETPLACE_TOKEN }}
