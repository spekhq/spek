name: Build Demo

on:
  push:
    branches: [master]
    paths: ["openspec/**"]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: ./
        with:
          title: "spek — OpenSpec Viewer Demo"
          output-path: "docs/demo.html"

      - name: Check for changes
        id: diff
        run: |
          git diff --quiet docs/demo.html && echo "changed=false" >> "$GITHUB_OUTPUT" || echo "changed=true" >> "$GITHUB_OUTPUT"

      - name: Commit updated demo
        if: steps.diff.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/demo.html
          git commit -m "Rebuild demo for latest openspec changes"
          git push
