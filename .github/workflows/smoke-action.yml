# 暫時性：驗證 move-to-spekhq-org 的 action 兩層都指向新位置後仍可運作。跑完即移除。
name: Smoke — action from new location

on:
  workflow_dispatch:

jobs:
  smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      # 第一層：uses: 解析到 spekhq/spek（這一層 GitHub 不 redirect）。
      # 第二層：該 action.yml 內的 `repository: spekhq/spek` 自我 checkout。
      - id: build
        uses: spekhq/spek@master
        with:
          generate-badges: "true"

      - name: Assert outputs exist
        run: |
          test -f "${{ steps.build.outputs.html-path }}" || { echo "no html"; exit 1; }
          test -d "${{ steps.build.outputs.badges-path }}" || { echo "no badges"; exit 1; }
          echo "html: $(wc -c < "${{ steps.build.outputs.html-path }}") bytes"
          ls -1 "${{ steps.build.outputs.badges-path }}"
